<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz PM/MA — Operação Aprovação</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --red:#1a3a6e;--red-dark:#0d2244;--red-light:#2a5aaa;
    --gold:#f5c518;--gold-dark:#c9a000;
    --blue-bg:#060d1a;--blue-mid:#0a1628;--blue-light:#0d2244;
    --white:#ffffff;--correct:#27ae60;--wrong:#e74c3c;
    --option-bg:linear-gradient(135deg,#0d2244 0%,#1a3a6e 50%,#0a1e50 100%);
    --option-hover:linear-gradient(135deg,#1a3a8e 0%,#2a5aaa 50%,#1a3a7e 100%);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Oswald',sans-serif;background:var(--blue-bg);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;position:relative;}
  body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 50%,rgba(26,58,110,.4) 0%,transparent 60%),radial-gradient(ellipse at 80% 50%,rgba(26,58,110,.4) 0%,transparent 60%),linear-gradient(180deg,#0a1628 0%,#0d1f3c 50%,#0a1628 100%);z-index:-2;}
  body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(255,255,255,.015) 2px,rgba(255,255,255,.015) 4px);z-index:-1;pointer-events:none;}
  .screen{display:none;width:100%;max-width:920px;padding:16px;}
  .screen.active{display:flex;flex-direction:column;align-items:center;}
  /* START */
  #start-screen{text-align:center;gap:24px;}
  .logo-main{font-size:52px;font-weight:700;color:var(--gold);text-shadow:0 0 30px rgba(245,197,24,.8),3px 3px 0 #7a5f00;letter-spacing:3px;text-transform:uppercase;line-height:1;animation:pulse-glow 2s ease-in-out infinite;}
  .logo-sub{font-size:22px;color:#fff;letter-spacing:8px;margin-top:-5px;text-shadow:0 0 15px rgba(255,255,255,.5);}
  @keyframes pulse-glow{0%,100%{text-shadow:0 0 30px rgba(245,197,24,.8),3px 3px 0 #7a5f00}50%{text-shadow:0 0 60px rgba(245,197,24,1),3px 3px 0 #7a5f00,0 0 100px rgba(245,197,24,.4)}}
  .coin-icon{font-size:80px;animation:shield-pulse 2.5s ease-in-out infinite;display:block;margin:0 auto;filter:drop-shadow(0 0 20px rgba(245,197,24,.8));}
  @keyframes shield-pulse{0%,100%{transform:scale(1);filter:drop-shadow(0 0 20px rgba(245,197,24,.8))}50%{transform:scale(1.08);filter:drop-shadow(0 0 36px rgba(245,197,24,1))}}
  .difficulty-selector{background:rgba(255,255,255,.05);border:2px solid var(--gold);border-radius:12px;padding:22px 36px;width:100%;max-width:500px;}
  .difficulty-selector h3{color:var(--gold);font-size:18px;margin-bottom:14px;letter-spacing:2px;}
  .diff-buttons{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
  .diff-btn{padding:10px 20px;border:2px solid;border-radius:8px;font-family:'Oswald',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;text-transform:uppercase;letter-spacing:1px;}
  .diff-btn[data-diff="facil"]{border-color:#27ae60;color:#27ae60;background:rgba(39,174,96,.1);}
  .diff-btn[data-diff="medio"]{border-color:var(--gold);color:var(--gold);background:rgba(245,197,24,.1);}
  .diff-btn[data-diff="dificil"]{border-color:#e74c3c;color:#e74c3c;background:rgba(231,76,60,.1);}
  .diff-btn[data-diff="todos"]{border-color:#9b59b6;color:#9b59b6;background:rgba(155,89,182,.1);}
  .diff-btn.selected{color:#fff!important;}
  .diff-btn[data-diff="facil"].selected{background:#27ae60;}
  .diff-btn[data-diff="medio"].selected{background:var(--gold-dark);color:#000!important;}
  .diff-btn[data-diff="dificil"].selected{background:#e74c3c;}
  .diff-btn[data-diff="todos"].selected{background:#9b59b6;}
  .start-btn{background:linear-gradient(135deg,var(--gold-dark),var(--gold),var(--gold-dark));color:#1a0000;border:none;padding:16px 56px;font-family:'Oswald',sans-serif;font-size:24px;font-weight:700;letter-spacing:3px;border-radius:50px;cursor:pointer;text-transform:uppercase;box-shadow:0 8px 30px rgba(245,197,24,.5);transition:all .2s;animation:btn-pulse 2s ease-in-out infinite;}
  .start-btn:hover{transform:scale(1.05);box-shadow:0 12px 40px rgba(245,197,24,.7);}
  @keyframes btn-pulse{0%,100%{box-shadow:0 8px 30px rgba(245,197,24,.5)}50%{box-shadow:0 8px 50px rgba(245,197,24,.9)}}
  .stats-box{display:flex;gap:28px;color:rgba(255,255,255,.7);font-size:13px;letter-spacing:1px;}
  .stats-box span{color:var(--gold);font-weight:700;font-size:20px;}
  /* GAME */
  #game-screen{gap:10px;}
  .top-bar{width:100%;display:flex;align-items:center;justify-content:space-between;padding:6px 0;}
  .level-badge{background:linear-gradient(135deg,var(--red-dark),var(--red));border:2px solid var(--gold);border-radius:8px;padding:7px 16px;text-align:center;}
  .level-badge .level-label{font-size:10px;color:rgba(255,255,255,.7);letter-spacing:2px;}
  .level-badge .level-num{font-size:22px;font-weight:700;color:var(--gold);line-height:1;}
  .score-display{background:linear-gradient(135deg,#0d2244,#1a3a6e);border:2px solid var(--gold);border-radius:8px;padding:7px 16px;text-align:center;}
  .score-display .score-label{font-size:10px;color:rgba(255,255,255,.7);letter-spacing:2px;}
  .score-display .score-num{font-size:22px;font-weight:700;color:var(--gold);line-height:1;}
  .game-logo{font-size:17px;font-weight:700;color:var(--gold);letter-spacing:2px;text-transform:uppercase;}
  .diff-indicator{display:flex;gap:5px;align-items:center;}
  .diff-dot{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,.2);}
  .diff-dot.active{background:var(--gold);box-shadow:0 0 6px var(--gold);}
  .diff-dot.active.med{background:#f39c12;}
  .diff-dot.active.hard{background:#e74c3c;}
  /* Timer */
  .timer-container{width:100%;display:flex;align-items:center;gap:6px;}
  .timer-circle{position:relative;width:86px;height:86px;flex-shrink:0;}
  .timer-circle svg{position:absolute;top:0;left:0;transform:rotate(-90deg);}
  .timer-circle .bg-c{fill:none;stroke:rgba(255,255,255,.1);stroke-width:6;}
  .timer-circle .prog-c{fill:none;stroke:var(--gold);stroke-width:6;stroke-linecap:round;transition:stroke-dashoffset 1s linear,stroke .5s;}
  .timer-number{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;color:var(--gold);transition:color .5s;}
  .timer-bar-wrapper{flex:1;height:8px;background:rgba(255,255,255,.1);border-radius:4px;overflow:hidden;border:1px solid rgba(255,255,255,.15);}
  .timer-bar{height:100%;background:linear-gradient(90deg,#27ae60,var(--gold),#e74c3c);border-radius:4px;transition:width 1s linear;width:100%;}
  /* Question */
  .question-box{width:100%;background:linear-gradient(135deg,rgba(139,0,0,.88),rgba(180,20,20,.88),rgba(120,0,0,.88));border:3px solid rgba(255,255,255,.15);border-radius:12px;padding:20px 26px;position:relative;overflow:hidden;box-shadow:0 10px 40px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.15);}
  .question-box::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,var(--gold),transparent);}
  .question-number{font-size:11px;color:rgba(255,255,255,.5);letter-spacing:3px;margin-bottom:6px;text-transform:uppercase;}
  .question-text{font-size:20px;font-weight:600;color:#fff;line-height:1.4;text-shadow:1px 1px 3px rgba(0,0,0,.5);text-transform:uppercase;letter-spacing:.5px;}
  /* Options */
  .options-grid{width:100%;display:grid;grid-template-columns:1fr 1fr;gap:9px;}
  .option-btn{display:flex;align-items:center;gap:12px;background:var(--option-bg);border:2px solid rgba(255,255,255,.15);border-radius:10px;padding:14px 18px;cursor:pointer;transition:all .2s;text-align:left;position:relative;overflow:hidden;box-shadow:0 4px 15px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.15);}
  .option-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.1) 0%,transparent 50%);pointer-events:none;}
  .option-btn:not(:disabled):not(.eliminated):hover{background:var(--option-hover);border-color:var(--gold);transform:translateY(-2px);box-shadow:0 8px 25px rgba(0,0,0,.4),0 0 15px rgba(245,197,24,.3);}
  .option-btn:focus{outline:none;}
  @media (hover:none) and (pointer:coarse){
    .option-btn:not(:disabled):not(.eliminated):hover{background:var(--option-bg);border-color:rgba(255,255,255,.15);transform:none;box-shadow:0 4px 15px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.15);}
  }
  .option-btn:disabled{cursor:not-allowed;}
  .option-btn.eliminated{opacity:.18;pointer-events:none;filter:grayscale(1) blur(1px);transform:scale(.97);}
  .option-num{width:34px;height:34px;background:rgba(255,255,255,.15);border:2px solid rgba(255,255,255,.3);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:700;color:#fff;flex-shrink:0;}
  .option-text{font-size:15px;font-weight:600;color:#fff;text-transform:uppercase;letter-spacing:.5px;line-height:1.3;text-shadow:1px 1px 2px rgba(0,0,0,.5);}
  .option-btn.correct{background:linear-gradient(135deg,#1a6b35,#27ae60,#1a6b35)!important;border-color:#2ecc71!important;box-shadow:0 0 30px rgba(39,174,96,.6)!important;animation:correct-flash .5s ease;}
  .option-btn.wrong{background:linear-gradient(135deg,#7b1515,#e74c3c,#7b1515)!important;border-color:#ff6b6b!important;animation:shake .5s ease;}
  @keyframes correct-flash{0%{transform:scale(1)}50%{transform:scale(1.03)}100%{transform:scale(1)}}
  @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
  /* LIFELINES */
  .lifelines-row{width:100%;display:flex;gap:10px;justify-content:center;}
  .lifeline-btn{display:flex;flex-direction:column;align-items:center;gap:4px;background:linear-gradient(135deg,#0d2244,#1a3a6e);border:2px solid var(--gold);border-radius:14px;padding:11px 18px;cursor:pointer;transition:all .25s;min-width:92px;position:relative;overflow:hidden;}
  .lifeline-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(245,197,24,.1) 0%,transparent 60%);pointer-events:none;}
  .lifeline-btn:hover:not(:disabled){transform:translateY(-3px);box-shadow:0 8px 24px rgba(245,197,24,.35),0 0 20px rgba(245,197,24,.2);border-color:#fff;}
  .lifeline-btn.used{opacity:.22;cursor:not-allowed;filter:grayscale(1);border-color:rgba(255,255,255,.15);pointer-events:none;}
  .lifeline-btn.used::after{content:'USADO';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:11px;color:rgba(255,100,100,.8);font-weight:700;letter-spacing:2px;background:rgba(0,0,0,.4);}
  .ll-icon{font-size:24px;line-height:1;}
  .ll-label{font-size:10px;font-weight:700;color:var(--gold);letter-spacing:1.5px;text-align:center;text-transform:uppercase;}
  .ll-desc{font-size:9px;color:rgba(255,255,255,.45);letter-spacing:.5px;text-align:center;}
  /* Hint popup */
  .hint-popup,.skip-popup{position:fixed;inset:0;background:rgba(0,0,0,.78);display:flex;align-items:center;justify-content:center;z-index:990;animation:fadein .25s ease;}
  .hint-box{background:linear-gradient(135deg,#0a1e3c,#1a4a8e);border:3px solid var(--gold);border-radius:20px;padding:36px 44px;max-width:480px;width:92%;text-align:center;box-shadow:0 0 60px rgba(245,197,24,.25);position:relative;}
  .hint-box::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,var(--gold),transparent);border-radius:20px 20px 0 0;}
  .hint-icon{font-size:52px;margin-bottom:10px;}
  .hint-title{font-size:22px;font-weight:700;color:var(--gold);letter-spacing:2px;margin-bottom:14px;}
  .hint-text{font-size:17px;color:#fff;line-height:1.65;background:rgba(255,255,255,.07);border-radius:10px;padding:16px 20px;border-left:4px solid var(--gold);text-align:left;}
  .hint-close{margin-top:20px;background:var(--gold);color:#1a0000;border:none;padding:11px 32px;font-family:'Oswald',sans-serif;font-size:16px;font-weight:700;letter-spacing:2px;border-radius:30px;cursor:pointer;transition:all .2s;}
  .hint-close:hover{transform:scale(1.04);box-shadow:0 5px 18px rgba(245,197,24,.5);}
  .skip-box{background:linear-gradient(135deg,#0a1e3c,#1a2a6e);border:3px solid #9b59b6;border-radius:20px;padding:34px 42px;max-width:440px;width:92%;text-align:center;box-shadow:0 0 50px rgba(155,89,182,.25);}
  .skip-icon{font-size:50px;margin-bottom:10px;}
  .skip-title{font-size:22px;font-weight:700;color:#b87fe8;letter-spacing:2px;margin-bottom:8px;}
  .skip-sub{font-size:14px;color:rgba(255,255,255,.6);letter-spacing:1px;margin-bottom:22px;}
  .skip-actions{display:flex;gap:12px;justify-content:center;}
  .skip-yes{background:#9b59b6;color:#fff;border:none;padding:12px 28px;font-family:'Oswald',sans-serif;font-size:15px;font-weight:700;letter-spacing:1px;border-radius:30px;cursor:pointer;transition:all .2s;}
  .skip-yes:hover{background:#8e44ad;transform:scale(1.04);}
  .skip-no{background:transparent;color:rgba(255,255,255,.6);border:2px solid rgba(255,255,255,.3);padding:12px 28px;font-family:'Oswald',sans-serif;font-size:15px;font-weight:700;letter-spacing:1px;border-radius:30px;cursor:pointer;transition:all .2s;}
  .skip-no:hover{border-color:#fff;color:#fff;}
  /* Bottom */
  .bottom-info{width:100%;display:flex;gap:9px;justify-content:center;}
  .info-pill{padding:9px 18px;border-radius:8px;font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;text-align:center;min-width:90px;}
  .pill-errar{background:rgba(255,255,255,.1);border:2px solid rgba(255,255,255,.3);color:rgba(255,255,255,.7);}
  .pill-parar{background:rgba(245,197,24,.15);border:2px solid var(--gold);color:var(--gold);cursor:pointer;transition:all .2s;}
  .pill-parar:hover{background:var(--gold);color:#000;}
  .pill-acertar{background:rgba(39,174,96,.15);border:2px solid #27ae60;color:#27ae60;}
  /* Streak */
  .streak-bar{width:100%;display:flex;align-items:center;gap:10px;justify-content:center;}
  .streak-label{font-size:11px;color:rgba(255,255,255,.5);letter-spacing:2px;}
  .sdot{width:11px;height:11px;border-radius:2px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);transition:all .3s;}
  .sdot.lit{background:var(--gold);border-color:var(--gold);box-shadow:0 0 8px var(--gold);}
  /* Progress */
  .progress-container{width:100%;height:4px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden;}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--gold-dark),var(--gold));border-radius:2px;transition:width .5s ease;}
  /* RESULT */
  #result-screen{text-align:center;gap:18px;}
  .result-icon{font-size:76px;animation:bounce .6s ease;}
  @keyframes bounce{0%{transform:scale(0)}60%{transform:scale(1.2)}100%{transform:scale(1)}}
  .result-title{font-size:40px;font-weight:700;color:var(--gold);text-shadow:0 0 30px rgba(245,197,24,.5);}
  .result-subtitle{font-size:17px;color:rgba(255,255,255,.7);letter-spacing:2px;}
  .result-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;width:100%;max-width:500px;}
  .result-stat{background:rgba(255,255,255,.05);border:2px solid rgba(255,255,255,.15);border-radius:10px;padding:14px;}
  .result-stat .rs-num{font-size:30px;font-weight:700;color:var(--gold);}
  .result-stat .rs-label{font-size:10px;color:rgba(255,255,255,.5);letter-spacing:2px;text-transform:uppercase;}
  .result-answer-box{background:rgba(39,174,96,.15);border:2px solid #27ae60;border-radius:10px;padding:14px 22px;max-width:500px;width:100%;}
  .result-answer-box.wrong-box{background:rgba(231,76,60,.15);border-color:#e74c3c;}
  .rab-label{font-size:10px;color:rgba(255,255,255,.6);letter-spacing:2px;margin-bottom:4px;}
  .rab-text{font-size:17px;font-weight:700;color:#fff;}
  .action-buttons{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;}
  .action-btn{padding:13px 32px;border-radius:50px;font-family:'Oswald',sans-serif;font-size:17px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .2s;}
  .btn-next{background:var(--gold);color:#1a0000;border:none;box-shadow:0 5px 20px rgba(245,197,24,.4);}
  .btn-next:hover{transform:scale(1.05);box-shadow:0 8px 30px rgba(245,197,24,.6);}
  .btn-restart{background:transparent;color:rgba(255,255,255,.7);border:2px solid rgba(255,255,255,.3);}
  .btn-restart:hover{border-color:#fff;color:#fff;}
  /* EFFECTS */
  #effects-layer{position:fixed;inset:0;pointer-events:none;z-index:1000;}
  #effects-layer .skip-popup,#effects-layer .hint-popup{pointer-events:all;}
  .confetti-piece{position:absolute;opacity:0;animation:confetti-fall linear forwards;}
  @keyframes confetti-fall{0%{transform:translateY(-20px) rotate(0);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
  .wrong-overlay{position:fixed;inset:0;background:rgba(231,76,60,0);animation:wrong-flash 1s ease forwards;pointer-events:none;z-index:999;}
  @keyframes wrong-flash{0%{background:rgba(231,76,60,0)}20%{background:rgba(231,76,60,.3)}40%{background:rgba(231,76,60,.1)}60%{background:rgba(231,76,60,.25)}80%{background:rgba(231,76,60,.05)}100%{background:rgba(231,76,60,0)}}
  .timeout-overlay{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.7);z-index:998;animation:fadein .3s ease;}
  @keyframes fadein{from{opacity:0}to{opacity:1}}
  .timeout-box{background:linear-gradient(135deg,#1a0000,#3d0000);border:3px solid #e74c3c;border-radius:20px;padding:36px 56px;text-align:center;box-shadow:0 0 60px rgba(231,76,60,.5);}
  .timeout-icon{font-size:56px;}.timeout-text{font-size:34px;font-weight:700;color:#e74c3c;margin:8px 0;}.timeout-sub{color:rgba(255,255,255,.7);letter-spacing:2px;}
  .slide-in{animation:slideIn .4s ease forwards;}
  @keyframes slideIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
  @media(max-width:600px){
    .options-grid{grid-template-columns:1fr;}.question-text{font-size:17px;}.logo-main{font-size:36px;}
    .result-stats{grid-template-columns:1fr 1fr;}.option-text{font-size:13px;}
    .lifeline-btn{min-width:76px;padding:9px 11px;}.ll-icon{font-size:20px;}
  }
</style>
</head>
<body>
<div id="effects-layer"></div>

<!-- START -->
<div id="start-screen" class="screen active">
  <div>
    <span class="coin-icon">🛡️</span>
    <div class="logo-main">QUIZ PM/MA</div>
    <div class="logo-sub">OPERAÇÃO APROVAÇÃO</div>
  </div>
  <div class="difficulty-selector">
    <h3>ESCOLHA A DIFICULDADE</h3>
    <div class="diff-buttons">
      <button class="diff-btn selected" data-diff="todos" onclick="selectDiff(this)">TODAS</button>
      <button class="diff-btn" data-diff="facil" onclick="selectDiff(this)">FÁCIL</button>
      <button class="diff-btn" data-diff="medio" onclick="selectDiff(this)">MÉDIO</button>
      <button class="diff-btn" data-diff="dificil" onclick="selectDiff(this)">DIFÍCIL</button>
    </div>
  </div>
  <button class="start-btn" onclick="startGame()">▶ JOGAR AGORA</button>
  <div class="stats-box">
    <div>📋 <span>∞</span><br>QUESTÕES</div>
    <div>⏱️ <span>60s</span><br>POR QUESTÃO</div>
    <div>🎁 <span>3</span><br>AJUDAS</div>
  </div>
</div>

<!-- GAME -->
<div id="game-screen" class="screen">
  <div class="progress-container"><div class="progress-fill" id="progress-fill"></div></div>
  <div class="top-bar">
    <div class="level-badge"><div class="level-label">NÍVEL</div><div class="level-num" id="level-display">1</div></div>
    <div style="text-align:center">
      <div class="game-logo">🛡️ Quiz PM/MA</div>
      <div class="diff-indicator" id="diff-dots" style="justify-content:center;margin-top:4px;"></div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:5px">
      <div class="score-display"><div class="score-label">PONTOS</div><div class="score-num" id="score-display">0</div></div>
      <button id="mute-btn" onclick="SFX.toggleMute()" style="background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:6px;color:#fff;font-size:15px;padding:3px 9px;cursor:pointer;font-family:inherit;">🔊</button>
    </div>
  </div>
  <div class="timer-container">
    <div class="timer-circle">

// ══════════════════════════════════════
// STATE
// ══════════════════════════════════════
let ST={
  questions:[],currentIndex:0,score:0,totalAnswered:0,totalCorrect:0,
  streak:0,maxStreak:0,difficulty:'todos',timerInterval:null,timeLeft:60,
  answerLocked:false,currentQuestion:null,level:1,questionsPerLevel:10,
  usedQuestions:new Set(),
  lifelines:{elim:true,skip:true,hint:true},
  eliminatedIdx:[],
  apiQueue:[],isFetching:false,
};

function selectDiff(btn){
  document.querySelectorAll('.diff-btn').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');
  ST.difficulty=btn.dataset.diff;
}

function startGame(){
  ST.questions=shuffle([...BASE_Q]);
  if(ST.difficulty!=='todos') ST.questions=ST.questions.filter(q=>q.d===ST.difficulty);
  ST.currentIndex=0;ST.score=0;ST.totalAnswered=0;ST.totalCorrect=0;
  ST.streak=0;ST.level=1;ST.usedQuestions=new Set();
  ST.lifelines={elim:true,skip:true,hint:true};
  ST.apiQueue=[];ST.isFetching=false;
  updateLifelineUI();
  showScreen('game-screen');
  SFX.start();
  loadQuestion();
  setTimeout(()=>prefetchBatch(),4000);
}

async function loadQuestion(){
  ST.answerLocked=false;ST.eliminatedIdx=[];
  clearTimer();
  ST.level=Math.floor(ST.totalAnswered/ST.questionsPerLevel)+1;
  document.getElementById('level-display').textContent=ST.level;
  document.getElementById('score-display').textContent=ST.score;
  document.getElementById('pts-display').textContent=`✅ +${getPoints()} pts`;
  document.getElementById('progress-fill').style.width=Math.min((ST.totalAnswered/10000)*100,100)+'%';
  renderDiffDots();renderStreakDots();updateLifelineUI();

  let q=getNextQ();
  if(!q&&ST.apiQueue.length>0) q=ST.apiQueue.shift();
  if(!q) q=await fetchOneFromAPI();
  if(!q){
    ST.questions=shuffle([...BASE_Q]);
    if(ST.difficulty!=='todos') ST.questions=ST.questions.filter(q2=>q2.d===ST.difficulty);
    ST.currentIndex=0;q=ST.questions[ST.currentIndex++];
  }
  ST.currentQuestion=q;
  renderQuestion(q);startTimer();
  if(ST.apiQueue.length<4&&!ST.isFetching) prefetchBatch();
}

function getNextQ(){
  while(ST.currentIndex<ST.questions.length){
    const q=ST.questions[ST.currentIndex++];
    const k=q.q.substring(0,35);
    if(!ST.usedQuestions.has(k)){ST.usedQuestions.add(k);return q;}
  }
  return null;
}

async function prefetchBatch(){
  if(ST.isFetching)return;ST.isFetching=true;
  const diffMap={todos:'variados (mix de dificuldades)',facil:'fáceis',medio:'médios',dificil:'difíceis'};
  const lvl=ST.level;
  const prompt=`Gere 6 perguntas de quiz sobre o Estatuto dos Policiais Militares do Maranhão (Lei 6.513/1995) e a Medida Provisória 542/2026, com dificuldade ${diffMap[ST.difficulty]||'variada'} (nível ${lvl>=5?'difícil':lvl>=3?'médio':'fácil'}).
Temas: hierarquia, ingresso, promoções, licenças, prazos, direitos, deveres, disciplina, situações especiais, mudanças da MP 542/2026 (novos quadros, idades-limite, remuneração, plano de comando).
Responda APENAS com array JSON sem markdown:
[{"q":"pergunta?","o":["A","B","C","D"],"a":0,"d":"facil","h":"dica com artigo do estatuto em até 12 palavras"},...]
"a" é índice da correta (0-3). "d" é facil/medio/dificil. Varie os temas a cada chamada.`;
  try{
    const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1800,messages:[{role:"user",content:prompt}]})});
    const data=await r.json();
    const text=data.content?.[0]?.text||'';
    const clean=text.replace(/```json|```/g,'').trim();
    const arr=JSON.parse(clean);
    if(Array.isArray(arr)){
      arr.filter(q=>q.q&&Array.isArray(q.o)&&q.o.length===4&&q.a!==undefined)
         .forEach(q=>{const k=q.q.substring(0,35);if(!ST.usedQuestions.has(k))ST.apiQueue.push(q);});
    }
  }catch(e){}
  ST.isFetching=false;
}

async function fetchOneFromAPI(){
  const diffMap={todos:'variada',facil:'fácil',medio:'médio',dificil:'difícil'};
  const prompt=`Gere 1 pergunta de quiz sobre o Estatuto PM/MA (Lei 6.513/1995) ou MP 542/2026, dificuldade ${diffMap[ST.difficulty]||'variada'} nível ${ST.level>=5?'difícil':ST.level>=3?'médio':'fácil'}.
JSON apenas: {"q":"pergunta?","o":["A","B","C","D"],"a":0,"d":"facil","h":"dica com artigo em até 12 palavras"}`;
  try{
    const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:350,messages:[{role:"user",content:prompt}]})});
    const data=await r.json();
    const text=data.content?.[0]?.text||'';
    const parsed=JSON.parse(text.replace(/```json|```/g,'').trim());
    if(parsed.q&&Array.isArray(parsed.o)&&parsed.o.length===4&&parsed.a!==undefined)return parsed;
  }catch(e){}
  return null;
}

function renderQuestion(q){
  document.getElementById('q-number').textContent=`QUESTÃO ${ST.totalAnswered+1}`;
  document.getElementById('question-text').textContent=q.q;
  const grid=document.getElementById('options-grid');
  grid.innerHTML='';
  q.o.forEach((opt,i)=>{
    const btn=document.createElement('button');
    btn.className='option-btn'+(ST.eliminatedIdx.includes(i)?' eliminated':'');
    btn.dataset.index=i;
    btn.innerHTML=`<div class="option-num">${i+1}</div><div class="option-text">${opt}</div>`;
    btn.onclick=()=>{SFX.click();answerQuestion(i,btn,q);};
    btn.addEventListener('touchstart',()=>{btn.blur();},{passive:true});
    grid.appendChild(btn);
  });
  document.getElementById('question-box').classList.add('slide-in');
  setTimeout(()=>document.getElementById('question-box').classList.remove('slide-in'),400);
  if(document.activeElement&&document.activeElement!==document.body)document.activeElement.blur();
}

function answerQuestion(index,btn,q){
  if(ST.answerLocked||btn.classList.contains('eliminated'))return;
  ST.answerLocked=true;clearTimer();ST.totalAnswered++;
  const correct=q.a;
  const allBtns=document.querySelectorAll('.option-btn');
  allBtns.forEach(b=>b.disabled=true);
  if(index===correct){
    btn.classList.add('correct');
    ST.totalCorrect++;ST.streak++;
    if(ST.streak>ST.maxStreak)ST.maxStreak=ST.streak;
    ST.score+=getPoints();
    renderStreakDots();SFX.stopTick();SFX.applause();
    setTimeout(()=>launchConfetti(),200);
    setTimeout(()=>showResult(true,q),1600);
  }else{
    btn.classList.add('wrong');
    allBtns[correct].classList.add('correct');
    ST.streak=0;renderStreakDots();
    SFX.stopTick();SFX.wrong();
    setTimeout(()=>launchWrongEffect(),100);
    setTimeout(()=>showResult(false,q),1600);
  }
}

function timeUp(){
  if(ST.answerLocked)return;
  ST.answerLocked=true;ST.totalAnswered++;ST.streak=0;renderStreakDots();
  SFX.stopTick();SFX.timeout();
  const allBtns=document.querySelectorAll('.option-btn');
  allBtns.forEach(b=>b.disabled=true);
  allBtns[ST.currentQuestion.a].classList.add('correct');
  showTimeoutEffect();
  setTimeout(()=>showResult(false,ST.currentQuestion,true),2200);
}

function showResult(correct,q,timeout=false){
  clearTimeout(window._tot);
  const ov=document.querySelector('.timeout-overlay');if(ov)ov.remove();
  document.getElementById('result-icon').textContent=correct?'🎉':(timeout?'⏰':'❌');
  document.getElementById('result-title').textContent=correct?'CORRETO!':(timeout?'TEMPO ESGOTADO!':'ERROU!');
  document.getElementById('result-subtitle').textContent=correct?`+${getPoints()} pontos!`:(timeout?'O tempo acabou!':'Não foi dessa vez...');
  document.getElementById('rs-total').textContent=ST.totalAnswered;
  document.getElementById('rs-correct').textContent=ST.totalCorrect;
  document.getElementById('rs-score').textContent=ST.score;
  const ab=document.getElementById('result-answer-box');
  ab.style.display='';ab.className='result-answer-box'+(correct?'':' wrong-box');
  document.getElementById('correct-answer-display').textContent=q.o[q.a];
  showScreen('result-screen');
}

function nextQuestion(){showScreen('game-screen');loadQuestion();}
function stopGame(){if(confirm('Deseja parar e ver sua pontuação final?')){clearTimer();showFinalScreen();}}
function showFinalScreen(){
  document.getElementById('result-icon').textContent='🏆';
  document.getElementById('result-title').textContent='JOGO ENCERRADO!';
  document.getElementById('result-subtitle').textContent='Você escolheu parar.';
  document.getElementById('rs-total').textContent=ST.totalAnswered;
  document.getElementById('rs-correct').textContent=ST.totalCorrect;
  document.getElementById('rs-score').textContent=ST.score;
  document.getElementById('result-answer-box').style.display='none';
  showScreen('result-screen');
}
function restartGame(){document.getElementById('result-answer-box').style.display='';showScreen('start-screen');}

// ══════════════════════════════════════
// LIFELINES
// ══════════════════════════════════════
function useLifeline(type){
  if(ST.answerLocked||!ST.lifelines[type])return;
  ST.lifelines[type]=false;
  updateLifelineUI();
  SFX.lifeline();
  if(type==='elim') doEliminate();
  else if(type==='skip') doSkip();
  else doHint();
}

function doEliminate(){
  const q=ST.currentQuestion,correct=q.a;
  const wrong=[];
  for(let i=0;i<4;i++) if(i!==correct&&!ST.eliminatedIdx.includes(i))wrong.push(i);
  shuffle(wrong);
  const toElim=wrong.slice(0,2);
  ST.eliminatedIdx.push(...toElim);
  const allBtns=document.querySelectorAll('.option-btn');
  toElim.forEach(idx=>{
    const btn=allBtns[idx];
    btn.style.transition='all .35s ease';
    btn.style.opacity='0';btn.style.transform='scale(.92)';
    setTimeout(()=>{btn.classList.add('eliminated');btn.style.opacity='';btn.style.transform='';},350);
  });
}

function doSkip(){
  const popup=document.createElement('div');
  popup.className='skip-popup';
  popup.innerHTML=`<div class="skip-box">
    <div class="skip-icon">&#x23ED;&#xFE0F;</div>
    <div class="skip-title">PULAR PERGUNTA</div>
    <div class="skip-sub">Quer pular esta pergunta sem penalidade?</div>
    <div class="skip-actions">
      <button class="skip-yes">SIM, PULAR &#x25B6;</button>
      <button class="skip-no">CANCELAR</button>
    </div>
  </div>`;
  popup.addEventListener('click',e=>e.stopPropagation());
  popup.addEventListener('touchend',e=>e.stopPropagation());
  popup.querySelector('.skip-yes').addEventListener('click',e=>{e.stopPropagation();confirmSkip();});
  popup.querySelector('.skip-no').addEventListener('click',e=>{e.stopPropagation();cancelSkip();});
  document.getElementById('effects-layer').appendChild(popup);
}

function confirmSkip(){
  document.querySelector('.skip-popup')?.remove();
  clearTimer();SFX.stopTick();
  loadQuestion();
}
function cancelSkip(){
  document.querySelector('.skip-popup')?.remove();
  ST.lifelines.skip=true;updateLifelineUI();
}

function doHint(){
  const q=ST.currentQuestion;
  const hint=q.h||'Consulte o Estatuto da PM/MA (Lei 6.513/1995) ou a MP 542/2026.';
  const popup=document.createElement('div');
  popup.className='hint-popup';
  popup.innerHTML=`<div class="hint-box">
    <div class="hint-icon">&#x1F4A1;</div>
    <div class="hint-title">DICA B&#xCD;BLICA</div>
    <div class="hint-text">${hint}</div>
    <button class="hint-close">ENTENDIDO &#x2713;</button>
  </div>`;
  popup.addEventListener('click',e=>e.stopPropagation());
  popup.addEventListener('touchend',e=>e.stopPropagation());
  popup.querySelector('.hint-close').addEventListener('click',e=>{e.stopPropagation();popup.remove();});
  document.getElementById('effects-layer').appendChild(popup);
}

function updateLifelineUI(){
  ['elim','skip','hint'].forEach(type=>{
    const btn=document.getElementById(`ll-${type}`);
    if(!btn)return;
    if(!ST.lifelines[type]){btn.classList.add('used');btn.disabled=true;}
    else{btn.classList.remove('used');btn.disabled=false;}
  });
}

// ══════════════════════════════════════
// TIMER
// ══════════════════════════════════════
function startTimer(){
  ST.timeLeft=60;updateTimerUI();SFX.startTick();
  ST.timerInterval=setInterval(()=>{
    ST.timeLeft--;updateTimerUI();
    if(ST.timeLeft<=10&&ST.timeLeft>0)SFX.urgentTick();
    if(ST.timeLeft<=0){clearTimer();timeUp();}
  },1000);
}
function clearTimer(){
  SFX.stopTick();
  if(ST.timerInterval){clearInterval(ST.timerInterval);ST.timerInterval=null;}
}
function updateTimerUI(){
  const t=ST.timeLeft;
  document.getElementById('timer-num').textContent=t;
  document.getElementById('timer-bar').style.width=(t/60*100)+'%';
  const circle=document.getElementById('timer-svg');
  const C=2*Math.PI*38;
  circle.style.strokeDasharray=C;
  circle.style.strokeDashoffset=C-(t/60)*C;
  const numEl=document.getElementById('timer-num');
  if(t<=10){circle.style.stroke='#e74c3c';numEl.style.color='#e74c3c';numEl.style.animation=t<=5?'pulse-glow .5s infinite':'';}
  else if(t<=20){circle.style.stroke='#f39c12';numEl.style.color='#f39c12';numEl.style.animation='';}
  else{circle.style.stroke='var(--gold)';numEl.style.color='var(--gold)';numEl.style.animation='';}
}

// ══════════════════════════════════════
// HELPERS
// ══════════════════════════════════════
function getPoints(){
  const base={facil:100,medio:200,dificil:400};
  const diff=ST.currentQuestion?.d||'facil';
  return (base[diff]||100)+(ST.level*10)+(ST.streak>2?ST.streak*20:0)+Math.floor(ST.timeLeft*2);
}
function renderDiffDots(){
  const c=document.getElementById('diff-dots');c.innerHTML='';
  const lv=((ST.level-1)%3)+1;
  for(let i=1;i<=3;i++){const d=document.createElement('div');d.className='diff-dot'+(i<=lv?' active'+(i===3?' hard':i===2?' med':''):'');c.appendChild(d);}
}
function renderStreakDots(){
  const c=document.getElementById('streak-dots');c.innerHTML='';
  if(ST.streak>=5){c.innerHTML=`<span style="color:var(--gold);font-size:12px;letter-spacing:1px">🔥 ${ST.streak}x SEQUÊNCIA!</span>`;return;}
  for(let i=0;i<5;i++){const d=document.createElement('div');d.className='sdot'+(i<ST.streak?' lit':'');c.appendChild(d);}
}
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if(id==='game-screen')updateLifelineUI();
}
function shuffle(arr){for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}return arr;}

// ══════════════════════════════════════
// EFFECTS
// ══════════════════════════════════════
function launchConfetti(){
  const layer=document.getElementById('effects-layer');
  const colors=['#f5c518','#27ae60','#3498db','#e74c3c','#9b59b6','#1abc9c','#ffffff','#f39c12'];
  const shapes=['■','●','▲','★','♦'];
  for(let i=0;i<80;i++){
    const p=document.createElement('div');p.className='confetti-piece';
    const color=colors[Math.floor(Math.random()*colors.length)];
    const shape=shapes[Math.floor(Math.random()*shapes.length)];
    const size=Math.random()*12+8,left=Math.random()*100;
    const dur=Math.random()*2+1.5,delay=Math.random()*.8;
    p.style.cssText=`left:${left}%;top:-20px;font-size:${size}px;color:${color};width:auto;height:auto;background:none;animation-duration:${dur}s;animation-delay:${delay}s;text-shadow:0 0 6px ${color};`;
    p.textContent=shape;layer.appendChild(p);
    setTimeout(()=>p.remove(),(dur+delay)*1000+100);
  }
}
function launchWrongEffect(){
  const layer=document.getElementById('effects-layer');
  const ov=document.createElement('div');ov.className='wrong-overlay';layer.appendChild(ov);
  for(let i=0;i<6;i++){
    const b=document.createElement('div');
    b.style.cssText=`position:absolute;font-size:${Math.random()*30+20}px;left:${Math.random()*90}%;top:${Math.random()*80}%;animation:bolt-fade .8s ease forwards;animation-delay:${Math.random()*.4}s;opacity:0;`;
    b.textContent='⚡';layer.appendChild(b);setTimeout(()=>b.remove(),1200);
  }
  if(!document.getElementById('bolt-style')){
    const s=document.createElement('style');s.id='bolt-style';
    s.textContent='@keyframes bolt-fade{0%{transform:scale(0) rotate(-20deg);opacity:0}30%{transform:scale(1.3) rotate(0);opacity:1}100%{transform:scale(.8) rotate(10deg);opacity:0}}';
    document.head.appendChild(s);
  }
  setTimeout(()=>ov.remove(),1000);
}
function showTimeoutEffect(){
  const layer=document.getElementById('effects-layer');
  const box=document.createElement('div');box.className='timeout-overlay';
  box.innerHTML=`<div class="timeout-box"><div class="timeout-icon">⏰</div><div class="timeout-text">TEMPO ESGOTADO!</div><div class="timeout-sub">O TEMPO ACABOU</div></div>`;
  layer.appendChild(box);
  window._tot=setTimeout(()=>box.remove(),2100);
}

showScreen('start-screen');
</script>
